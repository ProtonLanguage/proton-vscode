<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a1a1a"/>
  
  <!-- Outer hexagon shape (subtle) -->
  <polygon points="64,8 112,36 112,92 64,120 16,92 16,36" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.3"/>

  <!-- Left bracket < -->
  <polyline points="38,40 18,64 38,88" fill="none" stroke="#FF6B00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket > -->
  <polyline points="90,40 110,64 90,88" fill="none" stroke="#FF6B00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hash # symbol in center -->
  <!-- Vertical lines -->
  <line x1="57" y1="44" x2="52" y2="84" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="71" y1="44" x2="66" y2="84" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- Horizontal lines -->
  <line x1="48" y1="58" x2="74" y2="58" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="45" y1="70" x2="71" y2="70" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

  <!-- Orange glow dot bottom right -->
  <circle cx="100" cy="100" r="10" fill="#FF6B00" opacity="0.9"/>
  <circle cx="100" cy="100" r="6" fill="#ffaa55"/>
</svg>
